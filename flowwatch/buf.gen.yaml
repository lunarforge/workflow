version: v2
plugins:
  # Go protobuf messages
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative

  # Connect-Go service stubs (handlers + clients)
  - remote: buf.build/connectrpc/go
    out: gen
    opt: paths=source_relative

  # OpenAPI v3 spec generation (for Redocly)
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: docs
    opt:
      - logtostderr=true
      - allow_merge=true
      - merge_file_name=flowwatch
inputs:
  - directory: proto

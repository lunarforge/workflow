syntax = "proto3";

package flowwatch.v1;

option go_package = "github.com/luno/workflow/flowwatch/gen/flowwatch/v1;flowwatchv1";

import "flowwatch/v1/types.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// AnalyticsService provides pre-aggregated metrics for dashboards:
// throughput, latency distributions, failure rates, step duration
// breakdowns, and failure heatmaps.
service AnalyticsService {
  // GetThroughput returns runs/minute over time, split by status.
  rpc GetThroughput(GetThroughputRequest) returns (GetThroughputResponse) {}

  // GetLatency returns end-to-end run latency percentiles over time.
  rpc GetLatency(GetLatencyRequest) returns (GetLatencyResponse) {}

  // GetFailureRate returns the percentage of failed runs over time.
  rpc GetFailureRate(GetFailureRateRequest) returns (GetFailureRateResponse) {}

  // GetStepDuration returns per-step duration percentiles with queue/exec
  // split, bottleneck detection, and trend data.
  rpc GetStepDuration(GetStepDurationRequest) returns (GetStepDurationResponse) {}

  // GetStepHeatmap returns a time-bucketed failure-rate matrix by step.
  rpc GetStepHeatmap(GetStepHeatmapRequest) returns (GetStepHeatmapResponse) {}
}

// ─── Common analytics params ───

message AnalyticsFilter {
  string workflow_id   = 1;  // optional: scope to single workflow (empty = all)
  string subsystem_id  = 2;  // optional: scope to single subsystem (empty = all)
  TimeRange time_range = 3;
  string granularity   = 4;  // "1m", "5m", "15m", "1h", "1d"
}

// ─── Throughput ───

message GetThroughputRequest {
  AnalyticsFilter filter = 1;
}

message ThroughputBucket {
  google.protobuf.Timestamp timestamp = 1;
  int32 succeeded  = 2;
  int32 failed     = 3;
  int32 running    = 4;
  int32 canceled   = 5;
  int32 total      = 6;
}

message GetThroughputResponse {
  repeated ThroughputBucket buckets = 1;
}

// ─── Latency ───

message GetLatencyRequest {
  AnalyticsFilter filter = 1;
}

message LatencyBucket {
  google.protobuf.Timestamp timestamp = 1;
  google.protobuf.Duration p50  = 2;
  google.protobuf.Duration p95  = 3;
  google.protobuf.Duration p99  = 4;
}

message GetLatencyResponse {
  repeated LatencyBucket buckets = 1;
}

// ─── Failure Rate ───

message GetFailureRateRequest {
  AnalyticsFilter filter = 1;
}

message FailureRateBucket {
  google.protobuf.Timestamp timestamp = 1;
  double rate       = 2;  // 0.0 – 1.0
  int32 total_runs  = 3;
  int32 failed_runs = 4;
}

message GetFailureRateResponse {
  repeated FailureRateBucket buckets = 1;
}

// ─── Step Duration ───

message GetStepDurationRequest {
  string workflow_id = 1;  // empty = aggregate across all workflows
  TimeRange time_range = 2;
}

message DurationPercentiles {
  google.protobuf.Duration p50 = 1;
  google.protobuf.Duration p95 = 2;
  google.protobuf.Duration p99 = 3;
}

message StepDurationTrendPoint {
  google.protobuf.Timestamp timestamp = 1;
  google.protobuf.Duration p50  = 2;
  google.protobuf.Duration p95  = 3;
  google.protobuf.Duration p99  = 4;
}

message StepDurationEntry {
  string step_name                        = 1;
  bool is_bottleneck                      = 2;  // true if p95 > 2× cross-step median
  DurationPercentiles queue_wait          = 3;
  DurationPercentiles execution           = 4;
  DurationPercentiles total               = 5;
  int64 sample_count                      = 6;
  repeated StepDurationTrendPoint trend   = 7;  // 7d trend by default
}

message GetStepDurationResponse {
  repeated StepDurationEntry steps                  = 1;
  google.protobuf.Duration bottleneck_threshold     = 2;  // the median × 2 value used for detection
}

// ─── Step Heatmap ───

message GetStepHeatmapRequest {
  AnalyticsFilter filter = 1;
}

message HeatmapCell {
  string step_name                        = 1;
  google.protobuf.Timestamp bucket_start  = 2;
  double failure_rate                     = 3;  // 0.0 – 1.0
  int32 total_executions                  = 4;
  int32 failed_executions                 = 5;
  google.protobuf.Duration avg_duration   = 6;
}

message GetStepHeatmapResponse {
  repeated HeatmapCell cells      = 1;
  repeated string step_names      = 2;  // ordered list of step names (row labels)
  repeated google.protobuf.Timestamp bucket_timestamps = 3;  // ordered time buckets (column labels)
}

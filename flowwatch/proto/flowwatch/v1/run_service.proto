syntax = "proto3";

package flowwatch.v1;

option go_package = "github.com/luno/workflow/flowwatch/gen/flowwatch/v1;flowwatchv1";

import "flowwatch/v1/types.proto";
import "google/protobuf/duration.proto";

// RunService provides CRUD access to workflow runs, step-level detail,
// and lifecycle actions (retry, cancel, pause, skip).
service RunService {
  // ─── Queries ───

  // ListRuns returns runs matching the given filters, with cursor pagination.
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {}

  // GetRun returns a single run by ID with full metadata.
  rpc GetRun(GetRunRequest) returns (GetRunResponse) {}

  // GetRunSteps returns all step executions for a run.
  rpc GetRunSteps(GetRunStepsRequest) returns (GetRunStepsResponse) {}

  // GetRunTimeline returns pre-computed timeline data for Gantt visualization.
  rpc GetRunTimeline(GetRunTimelineRequest) returns (GetRunTimelineResponse) {}

  // GetRunLogs returns log entries for a run, optionally filtered by step.
  rpc GetRunLogs(GetRunLogsRequest) returns (GetRunLogsResponse) {}

  // ─── Actions ───

  // RetryRun re-executes the entire workflow run from scratch.
  rpc RetryRun(RetryRunRequest) returns (RetryRunResponse) {}

  // RetryFromStep re-executes starting from the specified step.
  rpc RetryFromStep(RetryFromStepRequest) returns (RetryFromStepResponse) {}

  // CancelRun terminates a running workflow.
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse) {}

  // PauseRun suspends a running workflow.
  rpc PauseRun(PauseRunRequest) returns (PauseRunResponse) {}

  // ResumeRun resumes a paused workflow.
  rpc ResumeRun(ResumeRunRequest) returns (ResumeRunResponse) {}

  // SkipStep marks a failed step as skipped and continues the workflow.
  rpc SkipStep(SkipStepRequest) returns (SkipStepResponse) {}

  // ─── Bulk Actions ───

  // BulkRetry retries multiple runs in a single call.
  rpc BulkRetry(BulkRetryRequest) returns (BulkRetryResponse) {}

  // BulkCancel cancels multiple runs in a single call.
  rpc BulkCancel(BulkCancelRequest) returns (BulkCancelResponse) {}
}

// ─── Queries ───

message RunFilter {
  repeated string workflow_ids         = 1;
  repeated RunStatus statuses          = 2;
  TimeRange time_range                 = 3;
  string foreign_id                    = 4;  // exact match
  repeated string subsystem_ids        = 5;  // filter by subsystem(s)
  string trace_id                      = 6;  // find all runs in a trace
  map<string, string> metadata_match   = 7;  // key=value exact match
}

message ListRunsRequest {
  RunFilter filter             = 1;
  PaginationRequest pagination = 2;
  string order_by              = 3;  // "started_at" (default), "duration", "status"
  bool descending              = 4;  // default true (newest first)
}

message ListRunsResponse {
  repeated Run runs             = 1;
  PaginationResponse pagination = 2;
}

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  Run run = 1;
}

message GetRunStepsRequest {
  string run_id = 1;
}

message GetRunStepsResponse {
  repeated StepExecution steps = 1;
}

message GetRunTimelineRequest {
  string run_id = 1;
}

message TimelineEntry {
  string step_name                     = 1;
  StepStatus status                    = 2;
  int32 attempt                        = 3;
  google.protobuf.Duration offset      = 4;  // time offset from run start
  google.protobuf.Duration duration    = 5;
  google.protobuf.Duration queue_wait  = 6;
  ErrorDetail error                    = 7;
}

message GetRunTimelineResponse {
  string run_id                        = 1;
  google.protobuf.Duration total_duration = 2;
  repeated TimelineEntry entries       = 3;
}

message GetRunLogsRequest {
  string run_id              = 1;
  string step_name           = 2;  // optional: filter by step
  repeated LogLevel levels   = 3;  // optional: filter by level
  PaginationRequest pagination = 4;
}

message GetRunLogsResponse {
  repeated LogEntry logs         = 1;
  PaginationResponse pagination  = 2;
}

// ─── Actions ───

message RetryRunRequest {
  string run_id = 1;
}

message RetryRunResponse {
  string new_run_id = 1;  // ID of the newly created retry run
}

message RetryFromStepRequest {
  string run_id    = 1;
  string step_name = 2;
}

message RetryFromStepResponse {
  string new_run_id = 1;
}

message CancelRunRequest {
  string run_id = 1;
  string reason = 2;  // optional cancellation reason
}

message CancelRunResponse {}

message PauseRunRequest {
  string run_id = 1;
}

message PauseRunResponse {}

message ResumeRunRequest {
  string run_id = 1;
}

message ResumeRunResponse {}

message SkipStepRequest {
  string run_id    = 1;
  string step_name = 2;
  string reason    = 3;  // optional skip reason
}

message SkipStepResponse {}

// ─── Bulk ───

message BulkRetryRequest {
  repeated string run_ids = 1;
}

message BulkRetryResponse {
  repeated BulkActionResult results = 1;
}

message BulkCancelRequest {
  repeated string run_ids = 1;
  string reason           = 2;
}

message BulkCancelResponse {
  repeated BulkActionResult results = 1;
}

message BulkActionResult {
  string run_id       = 1;
  bool success        = 2;
  string error        = 3;  // populated when success=false
  string new_run_id   = 4;  // populated for retry actions
}

syntax = "proto3";

package flowwatch.v1;

option go_package = "github.com/luno/workflow/flowwatch/gen/flowwatch/v1;flowwatchv1";

import "flowwatch/v1/types.proto";
import "google/protobuf/duration.proto";

// WorkflowService provides read access to workflow definitions,
// graph topology, and engine capability negotiation.
service WorkflowService {
  // ListWorkflows returns all registered workflow definitions.
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse) {}

  // GetWorkflow returns a single workflow definition by ID.
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse) {}

  // GetGraph returns the DAG or state-machine topology for a workflow.
  rpc GetGraph(GetGraphRequest) returns (GetGraphResponse) {}

  // GetCapabilities returns the feature set supported by the connected engine.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse) {}

  // ─── Subsystems ───

  // ListSubsystems returns all registered subsystems.
  rpc ListSubsystems(ListSubsystemsRequest) returns (ListSubsystemsResponse) {}

  // GetSubsystem returns a single subsystem with summary stats.
  rpc GetSubsystem(GetSubsystemRequest) returns (GetSubsystemResponse) {}

  // ─── Trace correlation ───

  // GetTrace returns all runs linked by a trace ID across subsystems,
  // ordered as a waterfall (by start time, nested by parent-child spans).
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse) {}
}

// ─── ListWorkflows ───

message ListWorkflowsRequest {
  PaginationRequest pagination = 1;
}

message ListWorkflowsResponse {
  repeated WorkflowDefinition workflows = 1;
  PaginationResponse pagination         = 2;
}

// ─── GetWorkflow ───

message GetWorkflowRequest {
  string workflow_id = 1;
}

message GetWorkflowResponse {
  WorkflowDefinition workflow = 1;
}

// ─── GetGraph ───

message GetGraphRequest {
  string workflow_id = 1;
}

message GetGraphResponse {
  Graph graph = 1;
}

// ─── GetCapabilities ───

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  Capabilities capabilities = 1;
}

// ─── ListSubsystems ───

message ListSubsystemsRequest {}

message ListSubsystemsResponse {
  repeated SubsystemSummary subsystems = 1;
}

message SubsystemSummary {
  Subsystem subsystem           = 1;
  int32 workflow_count          = 2;
  int32 active_runs             = 3;  // currently running
  int32 failed_last_hour        = 4;
  double error_rate_last_hour   = 5;  // 0.0 – 1.0
}

// ─── GetSubsystem ───

message GetSubsystemRequest {
  string subsystem_id = 1;
}

message GetSubsystemResponse {
  SubsystemSummary subsystem           = 1;
  repeated WorkflowDefinition workflows = 2;  // workflows in this subsystem
}

// ─── GetTrace ───

message GetTraceRequest {
  string trace_id = 1;
}

message GetTraceResponse {
  string trace_id                      = 1;
  repeated TraceSpan spans             = 2;  // ordered by start time
  google.protobuf.Duration total_duration = 3;
  int32 subsystem_count                = 4;  // how many subsystems this trace touches
}

// TraceSpan represents one workflow run within a trace, positioned
// as a waterfall entry with parent-child nesting.
message TraceSpan {
  string span_id                         = 1;
  string parent_span_id                  = 2;  // empty if root
  Run run                                = 3;
  string subsystem_id                    = 4;
  google.protobuf.Duration offset        = 5;  // offset from trace start
  google.protobuf.Duration duration      = 6;
  repeated StepExecution steps           = 7;  // inline step data for waterfall detail
}
